name: Cron CI Monitor

on:
  workflow_dispatch:
    inputs:
      hours_back:
        description: 'Hours to look back for failures'
        required: false
        default: '24'
      workflows:
        description: 'Comma-separated workflow files to monitor (empty = all defaults)'
        required: false
        default: ''
      output_mode:
        description: 'Output mode'
        required: false
        default: 'daily-issue'
        type: choice
        options:
          - daily-issue
          - stdout
      use_agent:
        description: 'Use Claude Code agent for deeper analysis'
        required: false
        default: 'true'
        type: boolean
      reset_state:
        description: 'Reset state to force re-analysis of all jobs'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: ci-monitor
  cancel-in-progress: false

env:
  DEFAULT_WORKFLOWS: |
    nightly-test-amd.yml
    nightly-test-amd-rocm720.yml
    release-docker-amd-nightly.yml
    release-docker-amd-rocm720-nightly.yml
    amd-aiter-scout.yml
    pr-test-amd.yml
    pr-test-amd-rocm720.yml

jobs:
  prepare:
    runs-on: [self-hosted, amd-internal]
    permissions:
      issues: write
      contents: read
    outputs:
      workflows: ${{ steps.resolve.outputs.workflows }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve workflow list
        id: resolve
        env:
          INPUT_WORKFLOWS: ${{ github.event.inputs.workflows }}
        run: |
          WF_JSON=$(python3 -c "
          import json, os
          raw = os.environ.get('INPUT_WORKFLOWS') or os.environ['DEFAULT_WORKFLOWS']
          seps = [',', '\n']
          for s in seps:
              raw = raw.replace(s, '\n')
          items = [x.strip() for x in raw.split('\n') if x.strip()]
          print(json.dumps(items))
          ")
          echo "workflows=$WF_JSON" >> "$GITHUB_OUTPUT"
          echo "Resolved workflows: $WF_JSON"

      - name: Ensure daily issue exists
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          BOT_REPO: ${{ github.repository }}
        run: python scripts/ensure_daily_issue.py

  monitor:
    needs: prepare
    runs-on: [self-hosted, amd-internal]
    permissions:
      issues: write
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 7
      matrix:
        workflow: ${{ fromJSON(needs.prepare.outputs.workflows) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Derive safe cache key
        id: cachekey
        run: |
          SAFE=$(echo "${{ matrix.workflow }}" | tr '/.' '--')
          echo "key=$SAFE" >> "$GITHUB_OUTPUT"

      - name: Restore state
        uses: actions/cache@v4
        with:
          path: .state/
          key: ci-monitor-state-${{ steps.cachekey.outputs.key }}-${{ github.run_id }}
          restore-keys: |
            ci-monitor-state-${{ steps.cachekey.outputs.key }}-

      - name: Reset state
        if: ${{ github.event.inputs.reset_state == 'true' }}
        run: rm -rf .state/

      - name: Run CI Monitor for ${{ matrix.workflow }}
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          LLM_GATEWAY_KEY: ${{ secrets.LLM_GATEWAY_KEY }}
          LLM_GATEWAY_URL: ${{ secrets.LLM_GATEWAY_URL }}
          AGENT_PARALLEL: '3'
          AGENT_TIMEOUT_SECS: '1500'
          AGENT_MAX_TURNS: '150'
        run: |
          HOURS="${{ github.event.inputs.hours_back || '24' }}"
          OUTPUT="${{ github.event.inputs.output_mode || 'daily-issue' }}"

          ARGS="--hours-back $HOURS --output $OUTPUT --bot-repo ${{ github.repository }} --workflows ${{ matrix.workflow }}"

          USE_AGENT="${{ github.event.inputs.use_agent || 'true' }}"
          if [ "$USE_AGENT" = "true" ]; then
            ARGS="$ARGS --use-agent"
          fi

          python scripts/monitor_ci.py $ARGS

      - name: Save state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .state/
          key: ci-monitor-state-${{ steps.cachekey.outputs.key }}-${{ github.run_id }}

  finalize:
    needs: monitor
    if: always()
    runs-on: [self-hosted, amd-internal]
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update upstream Failure Trackers
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          LLM_GATEWAY_KEY: ${{ secrets.LLM_GATEWAY_KEY }}
          LLM_GATEWAY_URL: ${{ secrets.LLM_GATEWAY_URL }}
          TRACKER_AGENT_MAX_TURNS: '80'
          TRACKER_AGENT_TIMEOUT_SECS: '900'
        run: |
          USE_AGENT="${{ github.event.inputs.use_agent || 'true' }}"
          ARGS="--bot-repo ${{ github.repository }}"
          if [ "$USE_AGENT" != "true" ]; then
            ARGS="$ARGS --no-use-agent"
          fi
          python scripts/failure_tracker.py $ARGS
