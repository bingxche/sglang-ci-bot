name: CI Failure Monitor

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      hours_back:
        description: 'Hours to look back for failures'
        required: false
        default: '24'
      workflows:
        description: 'Comma-separated workflow files to monitor (empty = all defaults)'
        required: false
        default: ''
      output_mode:
        description: 'Output mode'
        required: false
        default: 'daily-issue'
        type: choice
        options:
          - daily-issue
          - stdout
      use_agent:
        description: 'Use Claude Code agent for deeper analysis'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: ci-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: [self-hosted, amd-internal]
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore state
        uses: actions/cache@v4
        with:
          path: .state/
          key: ci-monitor-state-${{ github.run_id }}
          restore-keys: |
            ci-monitor-state-

      - name: Run CI Monitor
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          LLM_GATEWAY_KEY: ${{ secrets.LLM_GATEWAY_KEY }}
          LLM_GATEWAY_URL: ${{ secrets.LLM_GATEWAY_URL }}
        run: |
          HOURS="${{ github.event.inputs.hours_back || '24' }}"
          OUTPUT="${{ github.event.inputs.output_mode || 'daily-issue' }}"
          WORKFLOWS="${{ github.event.inputs.workflows }}"

          ARGS="--hours-back $HOURS --output $OUTPUT --bot-repo ${{ github.repository }}"

          if [ -n "$WORKFLOWS" ]; then
            IFS=',' read -ra WF_ARRAY <<< "$WORKFLOWS"
            ARGS="$ARGS --workflows ${WF_ARRAY[*]}"
          fi

          USE_AGENT="${{ github.event.inputs.use_agent || 'false' }}"
          if [ "$USE_AGENT" = "true" ]; then
            ARGS="$ARGS --use-agent"
          fi

          python scripts/monitor_ci.py $ARGS

      - name: Save state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .state/
          key: ci-monitor-state-${{ github.run_id }}
