name: Teams Daily Report

on:
  schedule:
    # Run at 20:00 UTC daily (after nightly CI results are in)
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Report date (YYYY-MM-DD, default: today)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run (print card JSON, do not send)'
        required: false
        default: 'false'
        type: boolean

jobs:
  send-report:
    runs-on: [self-hosted, amd-internal]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send Teams report
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          ARGS=""
          DATE="${{ github.event.inputs.date }}"
          if [ -n "$DATE" ]; then
            ARGS="$ARGS --date $DATE"
          fi

          DRY="${{ github.event.inputs.dry_run }}"
          if [ "$DRY" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          python scripts/send_teams_report.py $ARGS
