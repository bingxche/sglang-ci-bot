name: CI Status Check

on:
  repository_dispatch:
    types: [ci-status]

  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to check CI status'
        required: true
        type: number

concurrency:
  group: ci-status-${{ github.event.client_payload.pr_number || github.event.inputs.pr_number }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: [self-hosted, amd-internal]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "number=${{ github.event.client_payload.pr_number }}" >> $GITHUB_OUTPUT
            echo "comment_author=${{ github.event.client_payload.comment_author }}" >> $GITHUB_OUTPUT
          else
            echo "number=${{ github.event.inputs.pr_number }}" >> $GITHUB_OUTPUT
            echo "comment_author=" >> $GITHUB_OUTPUT
          fi

      - name: Check CI Status
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          LLM_GATEWAY_KEY: ${{ secrets.LLM_GATEWAY_KEY }}
          LLM_GATEWAY_URL: ${{ secrets.LLM_GATEWAY_URL }}
          COMMENT_AUTHOR: ${{ steps.pr.outputs.comment_author }}
        run: python scripts/check_ci_for_pr.py ${{ steps.pr.outputs.number }}
